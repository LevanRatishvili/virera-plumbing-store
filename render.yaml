services:
  - type: web
    name: virera-plumbing-store
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:metadata
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.12.0
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5-mini
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
